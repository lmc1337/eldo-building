<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City of El Dorado - Building Department</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #2A2A4A;
    --navy-deep: #1E1E38;
    --navy-light: #3A3A5C;
    --gold: #C4A962;
    --gold-light: #D4BF82;
    --gold-pale: #E8DCC0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--navy-deep);
    color: #fff;
    overflow-x: hidden;
  }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(196,169,98,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(196,169,98,0.05) 0%, transparent 50%),
      linear-gradient(170deg, var(--navy-deep) 0%, var(--navy) 50%, var(--navy-light) 100%);
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -20%; right: -10%;
    width: 600px; height: 600px;
    border: 1px solid rgba(196,169,98,0.1);
    transform: rotate(45deg);
    animation: drift 20s ease-in-out infinite;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -15%; left: -5%;
    width: 400px; height: 400px;
    border: 1px solid rgba(196,169,98,0.07);
    transform: rotate(25deg);
    animation: drift 25s ease-in-out infinite reverse;
  }

  @keyframes drift {
    0%, 100% { transform: rotate(45deg) translate(0, 0); }
    50% { transform: rotate(45deg) translate(20px, -15px); }
  }

  .grain {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    z-index: 9999;
  }

  .gold-line {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    margin: 0 auto;
    animation: expandLine 1.2s ease-out 0.5s both;
  }

  @keyframes expandLine {
    from { width: 0; opacity: 0; }
    to { width: 60px; opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-mark {
    font-weight: 700;
    font-size: 3.2rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 0.2em;
    animation: fadeUp 0.8s ease-out both;
    position: relative; z-index: 1;
  }

  .logo-mark span {
    color: var(--gold-light);
    font-weight: 300;
    font-size: 1.4rem;
    vertical-align: super;
    margin-left: 0.15em;
    letter-spacing: 0.05em;
  }

  .department {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--gold-pale);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 0 1rem;
    animation: fadeUp 0.8s ease-out 0.2s both;
    position: relative; z-index: 1;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 600;
    color: #fff;
    text-align: center;
    max-width: 700px;
    line-height: 1.2;
    margin: 2rem 1rem 0.5rem;
    animation: fadeUp 0.8s ease-out 0.4s both;
    position: relative; z-index: 1;
  }

  .hero-title em { color: var(--gold); font-style: italic; }

  .hero-subtitle {
    font-size: 0.95rem;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    text-align: center;
    letter-spacing: 0.15em;
    margin: 1rem 1rem 3rem;
    animation: fadeUp 0.8s ease-out 0.6s both;
    position: relative; z-index: 1;
  }

  .cta-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    animation: fadeUp 0.8s ease-out 0.8s both;
    position: relative; z-index: 1;
  }

  .btn-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2.5rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy-deep);
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
  }

  .cta-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s ease;
  }

  .cta-btn:hover::before { left: 100%; }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(196,169,98,0.3); }

  .cta-btn svg {
    width: 18px; height: 18px;
    transition: transform 0.3s ease;
  }

  .cta-btn:hover svg { transform: translateX(4px); }

  .cta-btn.outline {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold);
  }

  .cta-btn.outline:hover {
    background: rgba(196,169,98,0.1);
    box-shadow: 0 8px 30px rgba(196,169,98,0.15);
  }

  .secondary-link {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.3s ease;
  }

  .secondary-link:hover { color: var(--gold-pale); }

  .contact-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(196,169,98,0.12);
    animation: fadeUp 0.8s ease-out 1s both;
    z-index: 1;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.05em;
  }

  .contact-item svg {
    width: 14px; height: 14px;
    color: var(--gold);
    opacity: 0.7;
  }

  @media (max-width: 600px) {
    .contact-bar { justify-content: center; text-align: center; }
    .logo-mark { font-size: 2.4rem; }
    .department { font-size: 1.1rem; letter-spacing: 0.15em; }
    .btn-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="grain"></div>

<script>
  function goToPage(pageName) {
    try {
      var base = window.top.location.href.split('/page/')[0];
      window.top.location.href = base + '/page/' + pageName;
    } catch(e) {
      alert('Navigation is only available when embedded in the Experience.');
    }
  }
</script>

<section class="hero">
  <div class="logo-mark">ELDO<span>KS</span></div>
  <div class="department">Building Department</div>
  <div class="gold-line"></div>

  <h1 class="hero-title"><em>Permits & Inspections</em></h1>
  <p class="hero-subtitle" style="margin-bottom:0.5rem;">Vacant Property Map</p>
  <p class="hero-subtitle" style="margin-top:0;">City of El Dorado, Kansas</p>

  <div class="cta-group">
    <div class="btn-row">
      <button class="cta-btn" onclick="goToPage('Map-Screen')">
        Explore the Map
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </button>
      <button class="cta-btn outline" onclick="goToPage('How-to-use')">
        How to Use
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </div>
    <a href="tel:3163219100" class="secondary-link">or call 316-321-9100</a>
  </div>

  <div class="contact-bar">
    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      226 N. Vine St., El Dorado, KS 67042
    </div>
    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      316-321-9100
    </div>
    <div class="contact-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      Mon–Fri &nbsp;8:00 AM – 5:00 PM
    </div>
  </div>
</section>

</body>
</html>
